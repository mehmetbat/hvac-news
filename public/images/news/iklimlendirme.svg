<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0c1a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="frost" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0.2"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="338" fill="url(#bg)"/>
  <rect width="600" height="338" fill="url(#grid)"/>

  <circle cx="460" cy="100" r="110" fill="rgba(14,165,233,0.05)"/>
  <circle cx="140" cy="250" r="90" fill="rgba(56,189,248,0.04)"/>

  <!-- Split AC indoor unit -->
  <g transform="translate(170, 70)">
    <!-- Wall mount bracket -->
    <rect x="20" y="0" width="220" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>

    <!-- Unit body -->
    <rect x="0" y="6" width="260" height="75" rx="10" fill="rgba(14,165,233,0.1)" stroke="url(#accent)" stroke-width="1.5"/>

    <!-- Display panel -->
    <rect x="200" y="20" width="40" height="18" rx="3" fill="rgba(14,165,233,0.15)" stroke="rgba(56,189,248,0.3)" stroke-width="0.5"/>
    <text x="220" y="33" font-family="monospace" font-size="11" fill="url(#accent)" text-anchor="middle" opacity="0.8">22°</text>

    <!-- Louver lines -->
    <g opacity="0.3">
      <line x1="20" y1="55" x2="180" y2="55" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
      <line x1="20" y1="60" x2="180" y2="60" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-linecap="round"/>
      <line x1="20" y1="65" x2="180" y2="65" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/>
      <line x1="20" y1="70" x2="180" y2="70" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-linecap="round"/>
    </g>

    <!-- LED indicator -->
    <circle cx="30" cy="25" r="3" fill="#22d3ee" opacity="0.8"/>

    <!-- Cool air flow -->
    <g opacity="0.4">
      <!-- Flow curves -->
      <path d="M40,85 Q60,110 50,140" fill="none" stroke="url(#frost)" stroke-width="2"/>
      <path d="M80,85 Q100,115 90,150" fill="none" stroke="url(#frost)" stroke-width="2"/>
      <path d="M120,85 Q140,110 130,145" fill="none" stroke="url(#frost)" stroke-width="2"/>
      <path d="M160,85 Q175,115 170,150" fill="none" stroke="url(#frost)" stroke-width="2"/>

      <!-- Snowflake particles -->
      <g transform="translate(55, 120)" opacity="0.6">
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#bae6fd" stroke-width="1"/>
        <line x1="-4.3" y1="-2.5" x2="4.3" y2="2.5" stroke="#bae6fd" stroke-width="1"/>
        <line x1="-4.3" y1="2.5" x2="4.3" y2="-2.5" stroke="#bae6fd" stroke-width="1"/>
      </g>
      <g transform="translate(105, 135)" opacity="0.4">
        <line x1="0" y1="-4" x2="0" y2="4" stroke="#bae6fd" stroke-width="0.8"/>
        <line x1="-3.5" y1="-2" x2="3.5" y2="2" stroke="#bae6fd" stroke-width="0.8"/>
        <line x1="-3.5" y1="2" x2="3.5" y2="-2" stroke="#bae6fd" stroke-width="0.8"/>
      </g>
      <g transform="translate(150, 125)" opacity="0.5">
        <line x1="0" y1="-4" x2="0" y2="4" stroke="#bae6fd" stroke-width="0.8"/>
        <line x1="-3.5" y1="-2" x2="3.5" y2="2" stroke="#bae6fd" stroke-width="0.8"/>
        <line x1="-3.5" y1="2" x2="3.5" y2="-2" stroke="#bae6fd" stroke-width="0.8"/>
      </g>

      <!-- Mist particles -->
      <circle cx="70" cy="100" r="2" fill="rgba(186,230,253,0.3)"/>
      <circle cx="130" cy="110" r="1.5" fill="rgba(186,230,253,0.25)"/>
      <circle cx="95" cy="130" r="1.8" fill="rgba(186,230,253,0.2)"/>
      <circle cx="145" cy="140" r="1.5" fill="rgba(186,230,253,0.2)"/>
    </g>
  </g>

  <!-- Remote control -->
  <g transform="translate(470, 140)">
    <rect x="0" y="0" width="45" height="85" rx="8" fill="rgba(14,165,233,0.1)" stroke="rgba(56,189,248,0.4)" stroke-width="1"/>
    <!-- Screen -->
    <rect x="8" y="10" width="29" height="18" rx="3" fill="rgba(14,165,233,0.15)"/>
    <text x="22" y="23" font-family="monospace" font-size="9" fill="rgba(56,189,248,0.7)" text-anchor="middle">22°C</text>
    <!-- Buttons -->
    <circle cx="15" cy="42" r="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
    <circle cx="30" cy="42" r="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
    <text x="15" y="44" font-size="6" fill="rgba(255,255,255,0.3)" text-anchor="middle">−</text>
    <text x="30" y="44" font-size="6" fill="rgba(255,255,255,0.3)" text-anchor="middle">+</text>
    <!-- Power button -->
    <circle cx="22" cy="62" r="6" fill="none" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
    <path d="M22,56 L22,59" stroke="rgba(34,211,238,0.5)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Efficiency badge -->
  <g transform="translate(470, 250)">
    <rect x="0" y="0" width="50" height="22" rx="4" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="0.8"/>
    <text x="25" y="15" font-family="sans-serif" font-size="10" font-weight="bold" fill="rgba(34,197,94,0.7)" text-anchor="middle">A+++</text>
  </g>

  <path d="M0,0 L50,0 L0,50 Z" fill="rgba(14,165,233,0.06)"/>
  <path d="M600,338 L550,338 L600,288 Z" fill="rgba(14,165,233,0.06)"/>
</svg>
