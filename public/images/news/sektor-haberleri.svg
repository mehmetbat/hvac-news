<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a3a"/>
      <stop offset="50%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="338" fill="url(#bg)"/>
  <rect width="600" height="338" fill="url(#grid)"/>

  <circle cx="480" cy="80" r="120" fill="rgba(14,165,233,0.04)"/>
  <circle cx="100" cy="280" r="80" fill="rgba(16,185,129,0.04)"/>

  <!-- Building silhouette -->
  <g transform="translate(80, 60)">
    <!-- Main building -->
    <rect x="60" y="40" width="120" height="200" rx="3" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
    <!-- Windows -->
    <g opacity="0.3">
      <rect x="75" y="60" width="18" height="14" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="105" y="60" width="18" height="14" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="135" y="60" width="18" height="14" rx="1" fill="rgba(34,211,238,0.4)"/>
      <rect x="75" y="90" width="18" height="14" rx="1" fill="rgba(34,211,238,0.4)"/>
      <rect x="105" y="90" width="18" height="14" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="135" y="90" width="18" height="14" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="75" y="120" width="18" height="14" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="105" y="120" width="18" height="14" rx="1" fill="rgba(34,211,238,0.4)"/>
      <rect x="135" y="120" width="18" height="14" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="75" y="150" width="18" height="14" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="105" y="150" width="18" height="14" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="135" y="150" width="18" height="14" rx="1" fill="rgba(34,211,238,0.4)"/>
    </g>
    <!-- Rooftop HVAC units -->
    <rect x="80" y="28" width="25" height="12" rx="2" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.5)" stroke-width="1"/>
    <rect x="115" y="32" width="20" height="8" rx="2" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>

    <!-- Second building -->
    <rect x="190" y="90" width="80" height="150" rx="3" fill="rgba(14,165,233,0.06)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
    <g opacity="0.25">
      <rect x="200" y="105" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="222" y="105" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="244" y="105" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="200" y="130" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="222" y="130" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="244" y="130" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="200" y="155" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="222" y="155" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
      <rect x="244" y="155" width="14" height="10" rx="1" fill="rgba(14,165,233,0.3)"/>
    </g>
  </g>

  <!-- Growth chart -->
  <g transform="translate(360, 90)">
    <!-- Chart area -->
    <rect x="0" y="0" width="180" height="120" rx="6" fill="rgba(14,165,233,0.06)" stroke="rgba(14,165,233,0.2)" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="20" y1="30" x2="170" y2="30" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    <line x1="20" y1="60" x2="170" y2="60" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    <line x1="20" y1="90" x2="170" y2="90" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

    <!-- Chart line -->
    <polyline points="20,95 45,85 70,75 95,60 120,40 145,25 170,15"
      fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Area fill -->
    <polygon points="20,95 45,85 70,75 95,60 120,40 145,25 170,15 170,105 20,105"
      fill="url(#accent)" opacity="0.1"/>

    <!-- Data points -->
    <circle cx="70" cy="75" r="3" fill="#0ea5e9" opacity="0.7"/>
    <circle cx="120" cy="40" r="3" fill="#0ea5e9" opacity="0.7"/>
    <circle cx="170" cy="15" r="4" fill="#22d3ee" opacity="0.9"/>

    <!-- Bar chart overlay -->
    <rect x="30" y="75" width="12" height="30" rx="2" fill="url(#green)" opacity="0.5"/>
    <rect x="55" y="65" width="12" height="40" rx="2" fill="url(#green)" opacity="0.5"/>
    <rect x="80" y="55" width="12" height="50" rx="2" fill="url(#green)" opacity="0.5"/>
    <rect x="105" y="40" width="12" height="65" rx="2" fill="url(#green)" opacity="0.6"/>
    <rect x="130" y="30" width="12" height="75" rx="2" fill="url(#green)" opacity="0.6"/>
    <rect x="155" y="18" width="12" height="87" rx="2" fill="url(#green)" opacity="0.7"/>

    <!-- Percentage label -->
    <text x="165" y="12" font-family="sans-serif" font-size="9" font-weight="bold" fill="#22d3ee" opacity="0.8">+34%</text>
  </g>

  <!-- World map dots -->
  <g transform="translate(370, 230)" opacity="0.3">
    <circle cx="10" cy="15" r="2" fill="#0ea5e9"/>
    <circle cx="40" cy="10" r="2.5" fill="#22d3ee"/>
    <circle cx="70" cy="20" r="2" fill="#0ea5e9"/>
    <circle cx="95" cy="8" r="1.5" fill="#0ea5e9"/>
    <circle cx="120" cy="25" r="2" fill="#22d3ee"/>
    <circle cx="150" cy="12" r="2" fill="#0ea5e9"/>
    <circle cx="55" cy="35" r="1.5" fill="#0ea5e9"/>
    <circle cx="100" cy="40" r="2" fill="#22d3ee"/>
    <circle cx="135" cy="35" r="1.5" fill="#0ea5e9"/>
    <!-- Connection lines -->
    <line x1="40" y1="10" x2="70" y2="20" stroke="rgba(14,165,233,0.3)" stroke-width="0.5"/>
    <line x1="70" y1="20" x2="95" y2="8" stroke="rgba(14,165,233,0.3)" stroke-width="0.5"/>
    <line x1="95" y1="8" x2="120" y2="25" stroke="rgba(14,165,233,0.3)" stroke-width="0.5"/>
    <line x1="40" y1="10" x2="55" y2="35" stroke="rgba(14,165,233,0.2)" stroke-width="0.5"/>
  </g>

  <path d="M0,0 L50,0 L0,50 Z" fill="rgba(14,165,233,0.06)"/>
  <path d="M600,338 L550,338 L600,288 Z" fill="rgba(14,165,233,0.06)"/>
</svg>
