<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a3a"/>
      <stop offset="45%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0c1a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="338" fill="url(#bg)"/>
  <rect width="600" height="338" fill="url(#grid)"/>

  <circle cx="480" cy="70" r="100" fill="rgba(14,165,233,0.05)"/>
  <circle cx="120" cy="270" r="80" fill="rgba(14,165,233,0.04)"/>

  <!-- Newspaper / Document -->
  <g transform="translate(165, 55)">
    <!-- Main document -->
    <rect x="0" y="0" width="200" height="230" rx="6" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.4)" stroke-width="1.5"/>

    <!-- Header bar -->
    <rect x="0" y="0" width="200" height="35" rx="6" fill="rgba(14,165,233,0.12)"/>
    <rect x="0" y="20" width="200" height="15" fill="rgba(14,165,233,0.12)"/>

    <!-- HVAC text in header -->
    <text x="100" y="23" font-family="sans-serif" font-size="13" font-weight="bold" fill="url(#accent)" text-anchor="middle" letter-spacing="3" opacity="0.8">HVAC HABER</text>

    <!-- Divider -->
    <line x1="15" y1="40" x2="185" y2="40" stroke="rgba(14,165,233,0.3)" stroke-width="0.5"/>

    <!-- Featured article block -->
    <rect x="15" y="48" width="80" height="55" rx="3" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.2)" stroke-width="0.5"/>
    <!-- Play/image icon in block -->
    <circle cx="55" cy="70" r="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <polygon points="52,65 52,75 60,70" fill="rgba(255,255,255,0.15)"/>

    <!-- Article text lines -->
    <rect x="105" y="48" width="80" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="105" y="60" width="70" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="105" y="70" width="75" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="105" y="80" width="55" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
    <rect x="105" y="93" width="40" height="4" rx="2" fill="rgba(14,165,233,0.3)"/>

    <!-- Divider -->
    <line x1="15" y1="112" x2="185" y2="112" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

    <!-- Two column articles -->
    <!-- Left column -->
    <rect x="15" y="120" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
    <rect x="15" y="130" width="80" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
    <rect x="15" y="137" width="70" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
    <rect x="15" y="144" width="75" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
    <rect x="15" y="151" width="50" height="3" rx="1.5" fill="rgba(255,255,255,0.04)"/>

    <!-- Right column -->
    <rect x="105" y="120" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
    <rect x="105" y="130" width="80" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
    <rect x="105" y="137" width="65" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
    <rect x="105" y="144" width="75" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
    <rect x="105" y="151" width="55" height="3" rx="1.5" fill="rgba(255,255,255,0.04)"/>

    <!-- Divider -->
    <line x1="15" y1="165" x2="185" y2="165" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

    <!-- Bottom articles -->
    <rect x="15" y="173" width="170" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="15" y="182" width="170" height="3" rx="1.5" fill="rgba(255,255,255,0.05)"/>
    <rect x="15" y="189" width="140" height="3" rx="1.5" fill="rgba(255,255,255,0.05)"/>

    <rect x="15" y="202" width="170" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="15" y="211" width="170" height="3" rx="1.5" fill="rgba(255,255,255,0.05)"/>
    <rect x="15" y="218" width="130" height="3" rx="1.5" fill="rgba(255,255,255,0.05)"/>
  </g>

  <!-- Notification bell / breaking news -->
  <g transform="translate(400, 80)">
    <circle cx="30" cy="30" r="28" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
    <!-- Bell icon -->
    <path d="M30,15 Q30,12 27,12 Q18,12 18,24 L18,30 Q18,35 15,37 L45,37 Q42,35 42,30 L42,24 Q42,12 33,12 Q30,12 30,15 Z" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.7"/>
    <circle cx="30" cy="40" r="3" fill="url(#accent)" opacity="0.5"/>
    <!-- Alert dot -->
    <circle cx="42" cy="15" r="5" fill="rgba(239,68,68,0.7)"/>
    <text x="42" y="18" font-family="sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">3</text>
  </g>

  <!-- RSS icon -->
  <g transform="translate(410, 170)" opacity="0.5">
    <circle cx="20" cy="20" r="18" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
    <circle cx="13" cy="27" r="3" fill="url(#accent)" opacity="0.6"/>
    <path d="M13,20 Q13,13 20,13" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M13,14 Q13,7 27,7" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Globe icon -->
  <g transform="translate(415, 240)" opacity="0.4">
    <circle cx="15" cy="15" r="14" fill="none" stroke="rgba(14,165,233,0.5)" stroke-width="1"/>
    <ellipse cx="15" cy="15" rx="7" ry="14" fill="none" stroke="rgba(14,165,233,0.3)" stroke-width="0.8"/>
    <line x1="1" y1="15" x2="29" y2="15" stroke="rgba(14,165,233,0.3)" stroke-width="0.8"/>
    <path d="M3,8 Q15,10 27,8" fill="none" stroke="rgba(14,165,233,0.2)" stroke-width="0.5"/>
    <path d="M3,22 Q15,20 27,22" fill="none" stroke="rgba(14,165,233,0.2)" stroke-width="0.5"/>
  </g>

  <path d="M0,0 L50,0 L0,50 Z" fill="rgba(14,165,233,0.06)"/>
  <path d="M600,338 L550,338 L600,288 Z" fill="rgba(14,165,233,0.06)"/>
</svg>
