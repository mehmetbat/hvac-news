<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a3a"/>
      <stop offset="50%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0c1a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="cool" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.4"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="338" fill="url(#bg)"/>
  <rect width="600" height="338" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="480" cy="60" r="120" fill="rgba(14,165,233,0.06)"/>
  <circle cx="120" cy="280" r="80" fill="rgba(249,115,22,0.05)"/>

  <!-- Heat pump unit body -->
  <g transform="translate(210, 85)">
    <!-- Outdoor unit base -->
    <rect x="0" y="40" width="180" height="140" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <rect x="0" y="40" width="180" height="140" rx="8" fill="rgba(14,165,233,0.08)"/>

    <!-- Fan grille -->
    <circle cx="90" cy="105" r="45" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <circle cx="90" cy="105" r="35" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <circle cx="90" cy="105" r="25" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Fan blades -->
    <g transform="translate(90,105)" opacity="0.6">
      <path d="M0,-30 C15,-20 15,20 0,30" fill="none" stroke="url(#accent)" stroke-width="2"/>
      <path d="M0,-30 C-15,-20 -15,20 0,30" fill="none" stroke="url(#accent)" stroke-width="2"/>
      <path d="M-30,0 C-20,15 20,15 30,0" fill="none" stroke="url(#accent)" stroke-width="2"/>
      <path d="M-30,0 C-20,-15 20,-15 30,0" fill="none" stroke="url(#accent)" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="url(#accent)"/>
    </g>

    <!-- Ventilation slots -->
    <line x1="15" y1="155" x2="35" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="160" x2="35" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="165" x2="35" y2="165" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Brand line -->
    <rect x="145" y="150" width="20" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

    <!-- Connection pipes -->
    <rect x="50" y="180" width="8" height="25" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="120" y="180" width="8" height="25" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

    <!-- Temperature indicators -->
    <!-- Warm side -->
    <g transform="translate(-40, 70)">
      <path d="M0,0 Q-20,25 0,50" fill="none" stroke="url(#warm)" stroke-width="2" opacity="0.7"/>
      <path d="M-8,5 Q-28,25 -8,45" fill="none" stroke="url(#warm)" stroke-width="1.5" opacity="0.4"/>
    </g>
    <!-- Cool side -->
    <g transform="translate(220, 70)">
      <path d="M0,0 Q20,25 0,50" fill="none" stroke="url(#cool)" stroke-width="2" opacity="0.7"/>
      <path d="M8,5 Q28,25 8,45" fill="none" stroke="url(#cool)" stroke-width="1.5" opacity="0.4"/>
    </g>

    <!-- Thermometer icon -->
    <g transform="translate(155, 55)">
      <rect x="0" y="0" width="6" height="18" rx="3" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <circle cx="3" cy="22" r="5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <rect x="1.5" y="8" width="3" height="10" rx="1.5" fill="url(#warm)" opacity="0.7"/>
      <circle cx="3" cy="22" r="3" fill="url(#warm)" opacity="0.7"/>
    </g>

    <!-- Top label bar -->
    <rect x="0" y="40" width="180" height="4" rx="2" fill="url(#accent)" opacity="0.4"/>
  </g>

  <!-- Subtle corner accents -->
  <path d="M0,0 L60,0 L0,60 Z" fill="rgba(14,165,233,0.06)"/>
  <path d="M600,338 L540,338 L600,278 Z" fill="rgba(14,165,233,0.06)"/>
</svg>
