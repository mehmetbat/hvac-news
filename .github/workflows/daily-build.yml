name: HVAC Haber — Günlük Build & Deploy

on:
  # Günde 2 kez: 06:00 ve 18:00 UTC (Türkiye: 09:00 ve 21:00)
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'

  # Manuel tetikleme (test için)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-rewrite-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Repo'yu çek
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Node.js kur
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Bağımlılıkları kur
      - name: Install dependencies
        run: npm ci

      # 4. RSS'den haberleri çek
      - name: Fetch news from RSS
        run: node scripts/fetch-news.mjs

      # 5. Claude API ile yeniden yaz
      - name: Rewrite with AI
        run: node scripts/rewrite-news.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # 6. Güncellenmiş news.json'u commit et
      - name: Commit updated news
        run: |
          git config user.name "HVAC Haber Bot"
          git config user.email "bot@hvachaber.com"
          git add src/data/news.json
          git diff --staged --quiet || git commit -m "chore: günlük haber güncellemesi $(date +%Y-%m-%d)"
          git push

      # 7. Astro build
      - name: Build static site
        run: npm run build

      # 8. FTP ile Hostinger'a deploy
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/hvac-news/
          dangerous-clean-slate: false
